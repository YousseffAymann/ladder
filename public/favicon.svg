<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#b8902e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" fill="#0a0a0a" rx="22"/>
  
  <g filter="url(#glow)">
    <!-- Upward arrow forming the vertical stem of L -->
    <path d="M35 75 L35 30 L48 15" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Abstract tennis ball curve forming the right side -->
    <path d="M70 25 C 45 40, 45 60, 70 75" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Ladder rungs -->
    <path d="M35 45 L50 45" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
    <path d="M35 60 L54 60" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>